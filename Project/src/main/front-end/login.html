<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>Login</title>

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@picocss/pico@2.1.1/css/pico.sand.min.css">

    <style>
        :root {
            /* making this original variable so can refer to throughout code */
            --stroomloop-blue: #225382;
        }

        body {
            /* used AI to help come up with a good gradient background */
            background: linear-gradient(160deg, #0b3d5c, #1a7aad, #5ab4d6);
        }

        main.container {
            max-width: 920px;
        }

        .loginpage {
            /* turning page into grid to get spacing correct */
            display: grid;
            /* splitting page in two equally */
            grid-template-columns: 1fr 1fr;
        }

        .leftside {
            /* same colour as the background of logo */
            background: var(--stroomloop-blue);
            padding: 52px 44px;
            /* sets text in section to white */
            color: white;
        }

        .rightside {
            background: white;
            padding: 52px 48px;
        }

        .blurb {
            /* making transparent box for blurb text */
            background: rgba(255, 255, 255, 0.145);
            padding: 20px;
            color: white;
            font-size: 0.92rem;
        }

        input[type = "email"], input[type = "password"] {
            width: 100%;
            font-size: 0.97rem;
        }

        button[type ="submit"] {
            background-color: var(--stroomloop-blue);
            color: #ffffff;
            font-size: 1rem;
            width: 100%;
        }

        button:hover {
            /* change colour of button when hovering over it */
            background-color: #2254828f;
        }


    </style>
</head>

<body>
    <main class = "container">
        <div class="loginpage">

            <div class = "leftside">
                <div class = "logo">
                    <img src = "Stroomloop.png" alt = "Stroomloop logo">
                    <!--add tagline and blurb down below-->
                    <p class = "tagline">"lsfcnofjeoif"</p>
                    <div class = "blurb">
                        Welcome to Stroomloop...
                    </div>
                </div>
            </div>

            <div class = "rightside">
                <h2>Log in</h2>
                <!--using method post to ensure the info is not seen in URL-->
                <form action="/login" method="post">
                    <!--input for email-->
                    <label for = "email">Email:</label>
                    <input
                        type="email"
                        name="email"
                        placeholder="name@emample.com"
                        required
                    >

                    <!--input for password-->
                    <label for = "password">Password:</label>
                    <input
                        type="password"
                        name="password"
                        placeholder="*********"
                        required
                    >
                    <button type="submit">Log in</button>
                </form>

                <p>OR</p>

                <!--alternate option of continuing as guest without logging in-->
                <form action = "/guest" method = "get">
                    Continue as guest <a href="/guest">here</a>
                </form>
            </div>  
        </div>
    </main>
</body>
