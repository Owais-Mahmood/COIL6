<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>Login</title>

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@picocss/pico@2.1.1/css/pico.sand.min.css">

    <style>
        :root {
            /* making this original variable so can refer to throughout code */
            --stroomloop-blue: #225382;
            --stroomloop-blue-transparent: #2254825a;
        }

        html, body{
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            /* added image as background */
            background-image: linear-gradient(180deg, #08081F, #466DFC);
            background-size: cover;
            width: 100%;
            height: 100%;
        
        }

        main.container {
            max-width: 100%;
            width: 100%;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 3fr;
        }

        .left-column {
            background-color: rgba(255, 255, 255, 0);
        }

        .user {
            
        }
        

    </style>
</head>

<body>
    <!--using container fluid so it fills the screen and is adaptable-->
    <main class = "container-fluid">
        <div class="dashboard">

            <div class = "left-column">
                <!--profile logo etc.-->
                <div class = "logo">
                    <img src = "stroomloop_transparent.png" alt = "Stroomloop logo" width="290" height="290">
                </div>
                <div class = "logo">
                    <img src = "profile_transparent.png" width="50" height="50">
                    <p class = "user">Guest</p>
                </div>
            </div>
            </div>

            <div class = "right-section">
                <!--all the dashboard info-->
            </div>  

            <div class = "top-section">
                <!--search bar and toggles etc.-->
            </div>
        </div>
    </main>
</body>
