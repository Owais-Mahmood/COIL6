<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>Login</title>

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@picocss/pico@2.1.1/css/pico.sand.min.css">

    <style>
        :root {
            /* making this original variable so can refer to throughout code */
            --stroomloop-blue: #225382;
            --stroomloop-blue-transparent: #2254825a;
        }

        html, body{
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            /* added image as background */
            background-color: var(--stroomloop-blue);
            background-size: cover;
            width: 100%;
            height: 100%;
        
        }

        main.container {
            max-width: 100%;
            width: 100%;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 3fr;
        }

        .left-column {
            background-color: white;
        }

        .top-section {
            display: flex;
            align-items: center;
            background-color: var(--stroomloop-blue-transparent);
            /* thinner top row */
            padding: 10px 24px;
        }

        .dashboard-title {
            font-size: 1.2rem;
            font-weight: 400;
            color: white;
            margin: 0;
        }

        .search-bar{
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 0;
            margin-left: auto;
        }

        input[type = "text"] {
            width: 300px !important;
            height: 28px !important; 
            margin: 0 !important;
            padding: 6px 8px !important;
            font-size: 0.8rem;
            line-height: 1 !important;
        }

        button[type ="submit"]{
            width: auto !important; 
            height: 28px !important; 
            margin: 0 !important;
            padding: 6px 8px !important;
            background-color: rgb(5, 147, 229);
            font-size: 0.8rem;
            line-height: 1 !important;
        }

        button:hover {
            /* change colour of button when hovering over it */
            background-color: rgba(5, 147, 229, 0.554);
        }
    </style>
</head>

<body>
    <!--using container fluid so it fills the screen and is adaptable-->
    <main class = "container-fluid">
        <div class="dashboard">

            <div class = "left-column">
                <!--profile logo etc.-->
            </div>

            <div class = "right-section">
                <!--all the dashboard info-->
                <div class = "top-section">
                    <!--search bar and title etc.-->
                    <h1 class = "dashboard-title"> Water Monitoring Dashboard</h1>
                    <div class = "search-bar">
                        <form action="/data" method="get">
                            <input type="text" name="query" placeholder="Enter search" required>
                            <button type="submit">🔍</button>
                        </form>
                    </div>
                </div>
            </div>  

        </div>
    </main>
</body>
