<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>Trends</title>

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@picocss/pico@2.1.1/css/pico.sand.min.css">

    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

    <style>
        :root {
            --stroomloop-blue: #225382;
            --stroomloop-blue-transparent: #2254825a;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            background-image: linear-gradient(180deg, #81C3DB, #F2FCFF);
            background-size: cover;
            width: 100%;
            height: 100%;
        }

        main.container {
            max-width: 100%;
            width: 100%;
        }

        .logo {
            transform: translateY(-27px);
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 4fr;
        }

        .left-column {
            background-color: rgba(255, 255, 255, 0);
        }

        .top-section {
            display: flex;
            align-items: center;
            background-color: var(--stroomloop-blue-transparent);
            padding: 10px 24px;
            border-radius: 8px;
        }

        .user {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .name {
            color: white;
        }

        .dashboard-title {
            font-size: 1.2rem;
            font-weight: 400;
            color: white;
            margin: 0;
        }

        .search-bar {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 0;
            margin-left: auto;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
            transform: translateY(30px);
        }

        .sidebarButton {
            color: white;
        }

        .right-section {
            padding-right: 30px;
        }

        .trends-content {
            display: grid;
            gap: 30px;
            margin-top: 30px;
            max-width: 1000px;
        }

        .trend-card {
            background-color: rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 20px;
            color: white;
        }

        .trend-card h3 {
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 1rem;
            font-weight: 600;
        }

        #chart-area {
            min-height: 400px;
        }

        .chart-info {
            color: white;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        input[type="text"] {
            width: 300px !important;
            height: 28px !important;
            margin: 0 !important;
            padding: 6px 8px !important;
            font-size: 0.8rem;
            line-height: 1 !important;
        }

        button[type="submit"] {
            width: auto !important;
            height: 28px !important;
            margin: 0 !important;
            padding: 6px 8px !important;
            background-color: rgb(5, 147, 229);
            font-size: 0.8rem;
            line-height: 1 !important;
        }

        button:hover {
            background-color: rgba(5, 147, 229, 0.554);
        }
    </style>
</head>

<body>
    <main class="container-fluid">
        <div class="dashboard">

            <div class="left-column">
                <div class="logo">
                    <img src="images/stroomloop_transparent.png" alt="Stroomloop logo" width="250" height="250">
                </div>

                <div class="user">
                    <img src="images/profile_transparent.png" width="50" height="50" alt="Profile icon">
                    <p class="name">Guest</p>
                </div>

                <div class="sidebar">
                    <a href="GuestDashboard.html" class="sidebarButton">Dashboard</a>
                    <a href="alerts.html" class="sidebarButton">Alerts</a>
                    <a href="trends.html" class="sidebarButton">Trends</a>
                    <a href="info.html" class="sidebarButton">Information</a>
                </div>
            </div>

            <div class="right-section">
                <div class="top-section">
                    <h1 class="dashboard-title">Water Monitoring Dashboard</h1>

                    <select id="site-select" style="width: 225px; margin-left: 10px; margin-bottom: 0;">
                        <option value="site_upstream">Site Upstream</option>
                        <option value="site_downstream">Site Downstream</option>
                        <option value="site_reservoir">Site Reservoir</option>
                    </select>

                    <div class="search-bar">
                        <form action="/data" method="get">
                            <input type="text" name="query" placeholder="Enter search" required>
                            <button type="submit">🔍</button>
                        </form>
                    </div>
                </div>

                <div class="trends-content">
                    <div class="trend-card">
                        <h3>pH Trend</h3>
                        <div id="chart-area"></div>
                        <p class="chart-info" id="chart-status">Loading chart data...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function getSavedSite() {
            return localStorage.getItem("selectedSite") || "site_upstream"
        }

        function setSavedSite(siteId) {
            localStorage.setItem("selectedSite", siteId)
        }

        const siteSelect = document.getElementById("site-select")
        siteSelect.value = getSavedSite()

        let chart = null

        function createChart(categories, values, siteName) {
            const options = {
                chart: {
                    type: "area",
                    height: 380,
                    animations: {
                        enabled: true,
                        easing: "easeinout",
                        speed: 800
                    },
                    toolbar: {
                        show: true
                    },
                    zoom: {
                        enabled: true
                    }
                },
                series: [
                    {
                        name: "pH",
                        data: values
                    }
                ],
                xaxis: {
                    categories: categories,
                    tickAmount: 6,
                    labels: {
                        show: true,
                        style: {
                            colors: "#ffffff"
                        },
                        hideOverlappingLabels: true
                    },
                    title: {
                        text: "Timestamp",
                        style: {
                            color: "#ffffff"
                        }
                    }
                },
                yaxis: {
                    labels: {
                        style: {
                            colors: "#ffffff"
                        }
                    },
                    title: {
                        text: "pH",
                        style: {
                            color: "#ffffff"
                        }
                    }
                },
                stroke: {
                    curve: "smooth",
                    width: 3
                },
                fill: {
                    type: "gradient",
                    gradient: {
                        shadeIntensity: 1,
                        opacityFrom: 0.45,
                        opacityTo: 0.08,
                        stops: [0, 90, 100]
                    }
                },
                dataLabels: {
                    enabled: false
                },
                tooltip: {
                    theme: "dark",
                    x: {
                        show: true
                    }
                },
                grid: {
                    borderColor: "rgba(255,255,255,0.15)"
                },
                title: {
                    text: `pH Over Time - ${siteName}`,
                    align: "left",
                    style: {
                        color: "#ffffff",
                        fontSize: "16px"
                    }
                },
                legend: {
                    labels: {
                        colors: "#ffffff"
                    }
                }
            }

            if (chart) {
                chart.destroy()
            }

            chart = new ApexCharts(document.querySelector("#chart-area"), options)
            chart.render()
        }

        async function loadTrendChart() {
            const selectedSite = siteSelect.value
            const chartStatus = document.getElementById("chart-status")

            try {
                chartStatus.textContent = "Loading chart data..."

                const response = await fetch(`/trends/${selectedSite}`)
                const data = await response.json()

                if (!Array.isArray(data) || data.length === 0) {
                    chartStatus.textContent = "No trend data found for this site."
                    if (chart) {
                        chart.destroy()
                        chart = null
                    }
                    return
                }

                const categories = data.map(item => item.timestamp)
                const values = data.map(item => item.ph)

                const siteLabel = selectedSite
                    .replace("site_", "Site ")
                    .replace("_", " ")
                    .replace(/\b\w/g, letter => letter.toUpperCase())

                createChart(categories, values, siteLabel)
                chartStatus.textContent = `Showing pH trend for ${siteLabel}.`
            } catch (error) {
                chartStatus.textContent = "Error loading trend data."
                if (chart) {
                    chart.destroy()
                    chart = null
                }
                console.error("Error loading trend chart:", error)
            }
        }

        siteSelect.addEventListener("change", () => {
            setSavedSite(siteSelect.value)
            loadTrendChart()
        })

        loadTrendChart()
    </script>
</body>
</html>
