<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stroomloop · Trends</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

<style>
    :root {
        --blue: #225382;
        --blue-dark: #1a3f63;
        --text-dark: #1c3a55;
        --text-mid: #3a5a7a;
        --text-light: #5a7a9a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(180deg, #81C3DB 0%, #F2FCFF 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 24px 16px;
    }

    .app {
        width: 100%;
        max-width: 1200px;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 24px 64px rgba(34,83,130,0.2);
        background: linear-gradient(to bottom,
            #c8eaf3 0%, #d8f0f7 18%, #e4f6fa 36%,
            #edfafc 58%, #f3fdfe 78%, #F2FCFF 100%);
    }

    /* NAVBAR — same as Dashboard */
    .navbar {
        display: flex;
        align-items: center;
        padding: 14px 24px;
        gap: 16px;
    }

    .logo {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 1rem;
        font-weight: 700;
        color: var(--blue);
        text-decoration: none;
        white-space: nowrap;
    }

    .logo-dot {
        width: 10px;
        height: 10px;
        background: var(--blue);
        border-radius: 50%;
    }

    .nav-pills {
        display: flex;
        gap: 2px;
        background: rgba(255,255,255,0.55);
        border: 1px solid rgba(255,255,255,0.8);
        border-radius: 50px;
        padding: 5px;
        margin: 0 auto;
        backdrop-filter: blur(8px);
    }

    .nav-pill {
        padding: 7px 20px;
        border-radius: 50px;
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--blue);
        text-decoration: none;
        transition: 0.2s;
    }

    .nav-pill:hover { background: rgba(255,255,255,0.6); }
    .nav-pill.active {
        background: white;
        font-weight: 600;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .login-btn {
        padding: 7px 18px;
        border-radius: 50px;
        font-size: 0.875rem;
        font-weight: 600;
        color: white;
        background: var(--blue);
        text-decoration: none;
    }
    .login-btn:hover { background: var(--blue-dark); }

    /* PAGE CONTENT */
    .page-content {
        padding: 24px 24px 32px;
    }

    /* TREND CARD — matches Dashboard card style */
    .trends-content {
        display: grid;
        gap: 16px;
        max-width: 900px;
    }

    .trend-card {
        background: rgba(255,255,255,0.65);
        border-radius: 14px;
        padding: 16px 18px;
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.8);
        box-shadow: 0 4px 18px rgba(34,83,130,0.07);
    }

    .trend-card h3 {
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--blue);
        margin-bottom: 14px;
    }

    #chart-area {
        min-height: 380px;
    }

    .chart-info {
        color: var(--text-light);
        font-size: 0.85rem;
        margin-top: 10px;
    }
</style>
</head>

<body>
<div class="app">

    <nav class="navbar">
        <div class="logo">
            <img src="images/stroomloop.png" width="200">
        </div>

        <div class="nav-pills">
            <a class="nav-pill" href="/dashboard.html">Dashboard</a>
            <a class="nav-pill" href="/alerts.html">Alerts</a>
            <a class="nav-pill active" href="/trends.html">Trends</a>
            <a class="nav-pill" href="/info.html">Information</a>
        </div>

        <a class="login-btn" href="/login.html">Log in</a>
    </nav>

    <div class="page-content">
        <div class="trends-content">

            <div class="trend-card">
                <h3>pH Trend</h3>
                <div id="chart-area"></div>
                <p class="chart-info" id="chart-status">Loading chart data...</p>
            </div>

        </div>
    </div>

</div>

<script>
function getSavedSite() {
    return localStorage.getItem("selectedSite") || "site_upstream";
}

let chart = null;

function createChart(categories, values, siteName) {
    const options = {
        chart: {
            type: "area",
            height: 380,
            animations: { enabled: true, easing: "easeinout", speed: 800 },
            toolbar: { show: true },
            zoom: { enabled: true },
            background: "transparent",
            fontFamily: "Inter, sans-serif"
        },
        series: [{ name: "pH", data: values }],
        xaxis: {
            categories: categories,
            tickAmount: 6,
            labels: { style: { colors: "#5a7a9a" }, hideOverlappingLabels: true },
            title: { text: "Timestamp", style: { color: "#5a7a9a" } }
        },
        yaxis: {
            labels: { style: { colors: "#5a7a9a" } },
            title: { text: "pH", style: { color: "#5a7a9a" } }
        },
        stroke: { curve: "smooth", width: 3, colors: ["#225382"] },
        fill: {
            type: "gradient",
            gradient: { shadeIntensity: 1, opacityFrom: 0.35, opacityTo: 0.05, stops: [0, 90, 100] }
        },
        colors: ["#225382"],
        dataLabels: { enabled: false },
        tooltip: { theme: "light" },
        grid: { borderColor: "rgba(34,83,130,0.1)" },
        title: {
            text: `pH Over Time — ${siteName}`,
            align: "left",
            style: { color: "#1c3a55", fontSize: "16px" }
        },
        legend: { labels: { colors: "#5a7a9a" } }
    };

    if (chart) chart.destroy();
    chart = new ApexCharts(document.querySelector("#chart-area"), options);
    chart.render();
}

async function loadTrendChart() {
    const site = getSavedSite();
    const chartStatus = document.getElementById("chart-status");

    try {
        chartStatus.textContent = "Loading chart data...";
        const data = await fetch(`/trends/${site}`).then(r => r.json());

        if (!Array.isArray(data) || data.length === 0) {
            chartStatus.textContent = "No trend data found for this site.";
            if (chart) { chart.destroy(); chart = null; }
            return;
        }

        const siteLabel = site
            .replace("site_", "Site ")
            .replace("_", " ")
            .replace(/\b\w/g, l => l.toUpperCase());

        createChart(
            data.map(d => d.timestamp),
            data.map(d => d.ph),
            siteLabel
        );

        chartStatus.textContent = `Showing pH trend for ${siteLabel}.`;

    } catch (e) {
        chartStatus.textContent = "Error loading trend data.";
        if (chart) { chart.destroy(); chart = null; }
        console.error(e);
    }
}

loadTrendChart();
</script>

</body>
</html>
