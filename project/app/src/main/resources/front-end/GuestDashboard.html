<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>GuestDashboard</title>

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@picocss/pico@2.1.1/css/pico.sand.min.css">

    <style>
        :root {
            --stroomloop-blue: #225382;
            --stroomloop-blue-transparent: #2254825a;
        }

        html, body{
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            background-image: linear-gradient(180deg, #08081F, #466DFC);
            background-size: cover;
            width: 100%;
            height: 100%;
        }

        main.container {
            max-width: 100%;
            width: 100%;
        }

        .logo {
            transform: translateY(-27px);
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 4fr;
        }

        .left-column {
            background-color: rgba(255, 255, 255, 0);
        }
       
        .top-section {
            display: flex;
            align-items: center;
            background-color: var(--stroomloop-blue-transparent);
            padding: 10px 24px;
            border-radius: 8px;
        }

        .user {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .name {
            color: white;
        }

        .dashboard-title {
            font-size: 1.2rem;
            font-weight: 400;
            color: white;
            margin: 0;
        }

        .search-bar{
            display: flex;
            align-items: center;
            margin-left: auto;
        }

        .sidebar{
            display: flex;
            flex-direction: column;
            gap: 20px;
            transform: translateY(30px);
        }

        .sidebarButton{
            color: white;
        }

        .right-section {
            padding-right: 30px;
        }

        .data-display{
            display: grid;
            grid-template-columns: repeat(2,1fr);
            row-gap: 40px;
            column-gap: 30px;
            margin-top: 30px;
            max-width: 900px;
        }

        .data-card {
            background-color: rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 20px;
            color: white;
            min-height: 120px;
        }

        .data-card h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1rem;
            font-weight: 600;
        }

        .data-value {
            font-size: 1.6rem;
            font-weight: bold;
            margin: 0;
            transition: opacity 0.3s ease;
        }

        .status-list {
            margin: 0;
            padding-left: 18px;
            color: white;
        }

        .status-normal { color: #4CAF50 !important; }
        .status-warning { color: #FFC107 !important; }
        .status-critical { color: #F44336 !important; }

        input[type="text"] {
            width: 300px !important;
            height: 28px !important;
            padding: 6px 8px !important;
            font-size: 0.8rem;
        }

        button {
            height: 28px !important;
            padding: 6px 8px !important;
            background-color: rgb(5,147,229);
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
<main class="container-fluid">
<div class="dashboard">

<div class="left-column">
    <div class="logo">
        <img src="images/stroomloop_transparent.png" width="250">
    </div>

    <div class="user">
        <img src="images/profile_transparent.png" width="50">
        <p class="name">Guest</p>
    </div>

    <div class="sidebar">
        <a href="GuestDashboard.html" class="sidebarButton">Dashboard</a>
        <a href="alerts.html" class="sidebarButton">Alerts</a>
        <a href="trends.html" class="sidebarButton">Trends</a>
        <a href="info.html" class="sidebarButton">Information</a>
    </div>
</div>

<div class="right-section">
<div class="top-section">

<h1 class="dashboard-title">Water Monitoring Dashboard</h1>

<select id="site-select" style="width:225px; margin-left:10px;">
    <option value="site_upstream">Site Upstream</option>
    <option value="site_downstream">Site Downstream</option>
    <option value="site_reservoir">Site Reservoir</option>
</select>

<p id="last-updated" style="color:white; margin-left:20px; font-size:0.8rem;">
    Last updated: --
</p>

<div class="search-bar">
    <form action="/data">
        <input type="text" name="query" placeholder="Enter search" required>
        <button>🔍</button>
    </form>
</div>

</div>

<div class="data-display">

<div class="data-card">
<h3>Total Alerts</h3>
<p class="data-value" id="alert-count">Loading...</p>
</div>

<div class="data-card">
<h3>Status Counts</h3>
<ul class="status-list" id="status-counts"></ul>
</div>

<div class="data-card"><h3>pH</h3><p id="ph-value" class="data-value"></p></div>

<div class="data-card">
    <h3>Conductivity</h3>
    <img id="conductivity-img" src="" width="100%" sytle="border-radius: 8px:"></img></div>

<div class="data-card"><h3>Turbidity</h3><p id="turbidity-value" class="data-value"></p></div>
<div class="data-card"><h3>Light</h3><p id="light-value" class="data-value"></p></div>
<div class="data-card"><h3>Water Level</h3><p id="water-level-value" class="data-value"></p></div>
<div class="data-card"><h3>Temperature</h3><p id="water-temp-value" class="data-value"></p></div>

<div class="data-card">
<h3>Latest Status</h3>
<p id="status-value" class="data-value"></p>
</div>

</div>
</div>
</div>
</main>

<script>
function getSavedSite(){return localStorage.getItem("selectedSite")||"site_upstream"}
function setSavedSite(s){localStorage.setItem("selectedSite",s)}

function updateTimestamp(){
    const t=new Date().toLocaleTimeString()
    document.getElementById("last-updated").textContent="Last updated: "+t
}

function updateWithFade(id,text,cls=null){
    const el=document.getElementById(id)
    el.style.opacity=0
    setTimeout(()=>{
        el.textContent=text
        if(cls) el.className=cls
        el.style.opacity=1
    },150)
}

async function loadLatest(){
    const site=document.getElementById("site-select").value
    const res=await fetch(`/latest/${site}`)
    const d=await res.json()

    updateWithFade("ph-value",d.ph+" pH")
    updateWithFade("turbidity-value",d.turbidityNtu+" NTU")
    updateWithFade("light-value",d.lightLux+" lux")
    updateWithFade("water-level-value",d.waterLevelCm+" cm")
    updateWithFade("water-temp-value",d.waterTemperatureC+" °C")

    updateWithFade("status-value",
        d.status.charAt(0).toUpperCase()+d.status.slice(1),
        "data-value status-"+d.status)
}

async function loadAlerts(){
    const r=await fetch("/alerts")
    const d=await r.json()
    updateWithFade("alert-count",d.count)
}

async function loadStatus(){
    const r=await fetch("/summary/status-counts")
    const d=await r.json()
    const list=document.getElementById("status-counts")
    list.innerHTML=""
    d.forEach(i=>{
        const li=document.createElement("li")
        li.textContent=i.status.charAt(0).toUpperCase()+i.status.slice(1)+": "+i.count
        list.appendChild(li)
    })
}

const select=document.getElementById("site-select")
select.value=getSavedSite()
updateConductivityImage(select.value)

select.addEventListener("change",()=>{
    setSavedSite(select.value)
    loadLatest()
    updateTimestamp()
    updateConductivityImage(select.value)
})

function refresh(){
    loadAlerts()
    loadStatus()
    loadLatest()
    updateTimestamp()
}

function updateConductivityImage(site) {
    const img = document.getElementById("conductivity-img")
    img.src = `outputs/conductivity_${site}.png`
    console.log("loading image:, img.src")
}

refresh()
setInterval(refresh,15000)
</script>

</body>
</html>
