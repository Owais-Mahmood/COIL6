<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stroomloop · Information</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-dark: #1a3f63;
            --blue-faint: rgba(34, 83, 130, 0.1);
            --text-dark: #1c3a55;
            --text-mid: #3a5a7a;
            --text-light: #5a7a9a;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
    
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #81C3DB 0%, #F2FCFF 100%);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 24px 16px;
        }

        .app {
            width: 100%;
            max-width: 1200px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(34,83,130,0.2);
            background: linear-gradient(to bottom,
                #c8eaf3 0%, #d8f0f7 18%, #e4f6fa 36%,
                #edfafc 58%, #f3fdfe 78%, #F2FCFF 100%);
        }

        .navbar {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 14px 24px;
            gap: 16px;
        }

        .nav-right {
            display: flex; align-items: center;
            gap: 12px; justify-content: flex-end;
        }

        .nav-clock {
            padding: 7px 18px; border-radius: 50px;
            font-size: 0.875rem; font-weight: 600; color: #225382;
            background: rgba(255,255,255,0.65); border: 1px solid rgba(255,255,255,0.85);
            backdrop-filter: blur(8px); white-space: nowrap; user-select: none;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            font-weight: 700;
            color: #225382;
            white-space: nowrap;
            text-decoration: none;
        }

        .logo-dot {
            width: 10px;
            height: 10px;
            background: #225382;
            border-radius: 50%;
            display: inline-block;
        }

        .nav-pills {
            background: rgba(255,255,255,0.55);
            border-radius: 50px;
            padding: 5px;
            display: flex;
            gap: 2px;
            margin: 0 auto;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.8);
        }

        .nav-pill {
            padding: 7px 20px;
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 500;
            color: #225382;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .nav-pill:hover { background: rgba(255,255,255,0.6); }

        .nav-pill.active {
            background: white;
            color: #225382;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .login-btn {
            padding: 7px 18px;
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 600;
            color: white;
            background: #225382;
            border: none;
            cursor: pointer;
            white-space: nowrap;
            text-decoration: none;
            display: inline-block;
        }

        .login-btn:hover { background: #1a3f63; }

        .page-content {
            padding: 20px 24px 32px;
        }

        .content {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .glossary {
            background: rgba(255,255,255,0.65);
            backdrop-filter: blur(8px);
            border-radius: 14px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 4px 18px rgba(34,83,130,0.07);
            font-size: 0.85rem;
            color: #3a5a7a;
        }

        .section-title {
            font-weight: 700;
            font-size: 1rem;
            margin: 50px 0 10px 0;
            color: #225382;
            display: block;
        }



        
        .intro {
            padding: 20px; 
            font-size: 0.85rem; 
            color: #3a5a7a; 
        }
        .intro-title {
            display: block;
            font-size: 1.2rem;
            font-weight: 550;
            
        }
        .intro-contents {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            line-height: 1;
        }

        .overall-metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .metric-box{
            display: block;
            font-size: 0.85rem;
            padding: 16px;
            border-radius: 8px;
            background: rgba(255,255,255,0.65); 
            backdrop-filter: blur(8px); 
            border: 1px solid rgba(255,255,255,0.8); 
            box-shadow: 0 4px 18px rgba(34,83,130,0.07); 
            color: #3a5a7a; 
        }

        .metric-title{
            display:block;
            font-weight: 500;
            font-size: 1rem;
        }
        .metric-contents{
            display:block;
            font-weight: 400;
            font-size: 0.8rem;
        }
        
        .overall-monitoring-sites {
            display:grid;
            grid-template-columns: repeat(3,1fr);
            gap: 30px;
        }

        .monitoring-sites-box{
            display: block;
            font-size: 0.85rem;
            padding: 16px;
            border-radius: 8px;
            background: rgba(255,255,255,0.65); 
            backdrop-filter: blur(8px); 
            border: 1px solid rgba(255,255,255,0.8); 
            box-shadow: 0 4px 18px rgba(34,83,130,0.07); 
            color: #3a5a7a; 
        }
        .monitoring-sites-title {
            display: block;
            font-weight: 500;
            font-size: 1rem;
            color: #3a5a7a; 
        }
        .monitoring-sites-contents {
            font-weight: 400;
            font-size: 0.8rem;
            color: #3a5a7a; 
        }
        ul { margin: 0; padding-left: 18px; }
        li { margin-bottom: 6px; }

        .scale{
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }

        .bar{
            width: 100%;
            height: 10px;
            border-radius: 50px;
            background: linear-gradient(90deg,rgba(255, 0, 0, 1), rgba(255, 221, 0, 1), rgba(30, 255, 0, 1), rgba(255, 221, 0, 1), rgba(255, 0, 0, 1));
        }

        .labels{
            display:flex;
            flex-direction: row;
            justify-content: space-between;
            font-size: 0.75rem;
            color: rgb(0, 0, 0);
            width: 100%;
            text-align: center;
        }

        .info-layout {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            margin-top: 8px;
        }

        .info-layout ul {
            flex: 1;
        }

        .bar-container {
            position: relative;
        }

        .pointer {
            position: absolute;
            top: -10px;
            transform: translateX(-50%);
            font-size: 22px;
            color: #225382;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 0 0 3px white, 0 0 3px white, 0 0 3px white;
        }

        .site-btn {
            padding: 6px 16px; border-radius: 50px;
            font-size: 0.8rem; font-weight: 500; border: none; cursor: pointer;
            background: rgba(255,255,255,0.55); color: #225382;
            font-family: 'Inter', sans-serif;
        }

        .site-btn.active { 
            background: #225382; 
            color: white; 
        }

        .site-toggle-row { 
            display: flex; 
            gap: 8px; 
            margin-top: 12px;
            justify-content: flex-end;
        }

        .verdict-strip {
            display: flex; 
            align-items: center; 
            gap: 12px;
            margin-top: 12px; 
            border-radius: 10px; 
            padding: 12px 16px;
            transition: background 0.4s ease, border-color 0.4s ease;
        }

        .verdict-strip.v-safe {
            background: rgba(34, 197, 94, 0.12);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .verdict-strip.v-warn {
            background: rgba(245, 158, 11, 0.12);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .verdict-strip.v-crit {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .verdict-icon { 
            font-size: 1.4rem; 
            flex-shrink: 0; 
            line-height: 1; 
        }

        .verdict-body { 
            flex: 1; 
        }

        .verdict-title {
            font-size: 0.85rem; 
            font-weight: 700; 
            color: var(--text-dark);
            margin-bottom: 2px;
        }

        .verdict-sub { 
            font-size: 0.72rem; 
            color: var(--text-mid); 
        }

        .stat-box {
            background: rgba(255,255,255,0.65);
            border-radius: 12px;
            padding: 10px 12px;
            backdrop-filter: blur(8px);
        }
        
        .stat-label {
            font-size: 0.6rem;
            font-weight: 700;
            color: #5a7a9a;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 2px;
        }

        .stat-val {
            font-size: 1.1rem;
            font-weight: 800;
            color: #1c3a55;
            line-height: 1.2;
        }

        .stat-badge {
            display: inline-block;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 3px;
        }

        .badge-ok   { background: #dcfce7; color: #16a34a; }
        .badge-warn { background: #fef3c7; color: #d97706; }
        .badge-crit { background: #fee2e2; color: #dc2626; }

        .site-stats {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .logout-btn {
            padding: 7px 18px; border-radius: 50px;
            font-size: 0.875rem; font-weight: 600; color: #225382;
            background: rgba(255,255,255,0.65); border: 1px solid rgba(255,255,255,0.85);
            cursor: pointer; text-decoration: none; display: inline-block;
            white-space: nowrap; backdrop-filter: blur(8px);
        }
        .logout-btn:hover { background: rgba(255,255,255,0.9); }

        .official-badge {
            font-size: 0.68rem; font-weight: 700;
            letter-spacing: 0.06em; text-transform: uppercase;
            background: linear-gradient(90deg, #b8860b, #ffd700, #b8860b, #ffd700);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 7.5s linear infinite;
            background-color: rgba(212,160,23,0.22);
            border: 1px solid rgba(196,140,10,0.6);
            padding: 3px 10px; border-radius: 50px;
            white-space: nowrap;
        }

        @keyframes shimmer {
            0%   { background-position: 0% center; }
            100% { background-position: 200% center; }
        }


    </style>
</head>
<body>

<div class="app">
    <nav class="navbar">
        <div style="display:flex; flex-direction:column; align-items:flex-start; gap:8px;">
            <img src="images/stroomloop.png" width="200">
            <span class="official-badge" style="position: relative; top: -13px;">Official Access</span>
        </div>
        <div class="nav-pills">
            <a class="nav-pill" href="/dashboard-government.html">Dashboard</a>
            <a class="nav-pill" href="/alerts-government.html">Alerts</a>
            <a class="nav-pill" href="/trends-government.html">Trends</a>
            <a class="nav-pill" href="/information-government.html">Information</a>
            <a class="nav-pill active" href="/exports-government.html">Exports & Insights</a>
        </div>
        <div class="nav-right">
            <div class="nav-clock" id="clock">--:--</div>
            <a class="logout-btn" href="/logout">Log out</a>
        </div>
    </nav>
</div>

</body>

<script src="/thresholds.js"></script>
<script>

    let currentSite = "site_upstream"

    function setSite(site) {
        currentSite = site

        document.querySelectorAll('.site-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.toLowerCase().includes(site.replace('site_', '')))})
    }

    function updateClock() {
        const now  = new Date();

        const hh   = String(now.getHours()).padStart(2, '0');
        const mm   = String(now.getMinutes()).padStart(2, '0');
        const dd   = String(now.getDate()).padStart(2, '0');
        const mo   = String(now.getMonth() + 1).padStart(2, '0');
        const yyyy = now.getFullYear();

        document.getElementById('clock').textContent = `${hh}:${mm} · ${dd}/${mo}/${yyyy}`;
    }


updateClock();
setInterval(updateClock, 1000);

</script>
</html>
