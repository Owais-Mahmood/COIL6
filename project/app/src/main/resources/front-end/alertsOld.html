<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stroomloop · Alerts</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
    :root {
        --blue: #225382;
        --blue-dark: #1a3f63;
        --blue-faint: rgba(34, 83, 130, 0.1);
        --text-dark: #1c3a55;
        --text-mid: #3a5a7a;
        --text-light: #5a7a9a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(180deg, #81C3DB 0%, #F2FCFF 100%);
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 24px 16px;
    }

    .app {
        width: 100%;
        max-width: 1200px;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 24px 64px rgba(34,83,130,0.2);
        background: linear-gradient(to bottom,
            #c8eaf3 0%, #d8f0f7 18%, #e4f6fa 36%,
            #edfafc 58%, #f3fdfe 78%, #F2FCFF 100%);
    }

    /* NAVBAR — identical to Dashboard */
    .navbar {
        display: flex;
        align-items: center;
        padding: 14px 24px;
        gap: 16px;
    }

    .logo {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 1rem;
        font-weight: 700;
        color: var(--blue);
        text-decoration: none;
        white-space: nowrap;
    }

    .logo-dot {
        width: 10px;
        height: 10px;
        background: var(--blue);
        border-radius: 50%;
    }

    .nav-pills {
        display: flex;
        gap: 2px;
        background: rgba(255,255,255,0.55);
        border: 1px solid rgba(255,255,255,0.8);
        border-radius: 50px;
        padding: 5px;
        margin: 0 auto;
        backdrop-filter: blur(8px);
    }

    .nav-pill {
        padding: 7px 20px;
        border-radius: 50px;
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--blue);
        text-decoration: none;
        transition: 0.2s;
    }

    .nav-pill:hover { background: rgba(255,255,255,0.6); }
    .nav-pill.active {
        background: white;
        font-weight: 600;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .nav-clock {
        padding: 7px 18px;
        border-radius: 50px;
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--blue);
        background: rgba(255,255,255,0.65);
        border: 1px solid rgba(255,255,255,0.85);
        backdrop-filter: blur(8px);
        white-space: nowrap;
        user-select: none;
    }

    .login-btn {
        padding: 7px 18px;
        border-radius: 50px;
        font-size: 0.875rem;
        font-weight: 600;
        color: white;
        background: var(--blue);
        text-decoration: none;
    }
    .login-btn:hover { background: var(--blue-dark); }

    /* PAGE CONTENT */
    .page-content {
        padding: 24px 24px 32px;
    }

    /* ALERT CARDS — now matching Dashboard proportions */
    .alerts-content {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        max-width: 900px;
    }

    .alert-card {
        background: rgba(255,255,255,0.65);
        border-radius: 14px;
        padding: 16px 18px;
        backdrop-filter: blur(8px);
        box-shadow: 0 4px 18px rgba(34,83,130,0.07);
        border: 1px solid rgba(255,255,255,0.8);
    }

    .alert-card h3 {
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--blue);
        margin-bottom: 10px;
    }

    .alert-value {
        font-size: 1.9rem;
        font-weight: 700;
        color: var(--text-dark);
        transition: opacity 0.3s ease;
    }

    .status-list {
        padding-left: 18px;
        color: var(--text-mid);
        transition: opacity 0.3s ease;
    }

    .status-list li { margin-bottom: 6px; }

</style>
</head>

<body>
<div class="app">

    <nav class="navbar">
        <div class="logo">
            <img src="images/stroomloop.png" width="200">
        </div>

        <div class="nav-pills">
            <a class="nav-pill" href="/dashboard.html">Dashboard</a>
            <a class="nav-pill active" href="/alerts.html">Alerts</a>
            <a class="nav-pill" href="/trends.html">Trends</a>
            <a class="nav-pill" href="/info.html">Information</a>
        </div>
        <div class="nav-clock" id="clock">--:--</div>
        <a class="login-btn" href="/login.html">Log in</a>
    </nav>

    <div class="page-content">

        <div class="alerts-content">

            <div class="alert-card">
                <h3>Total Alert‑Triggered Readings</h3>
                <p class="alert-value" id="alert-count">Loading...</p>
            </div>

            <div class="alert-card">
                <h3>Status Breakdown</h3>
                <ul class="status-list" id="status-counts">
                    <li>Loading...</li>
                </ul>
            </div>

            <div class="alert-card">
                <h3>Critical Readings</h3>
                <p class="alert-value" id="critical-count">Loading...</p>
            </div>

            <div class="alert-card">
                <h3>Warning Readings</h3>
                <p class="alert-value" id="warning-count">Loading...</p>
            </div>

        </div>

    </div>
</div>

<script>
function fadeUpdate(el, val) {
    el.style.opacity = 0;
    setTimeout(() => {
        el.textContent = val;
        el.style.opacity = 1;
    }, 150);
}

function updateClock() {
    const now = new Date();

    const past = new Date(now);
    past.setFullYear(past.getFullYear() - 3);

    const hours = String(past.getHours()).padStart(2, '0');
    const mins  = String(past.getMinutes()).padStart(2, '0');

    const day   = String(past.getDate()).padStart(2, '0');
    const month = String(past.getMonth() + 1).padStart(2, '0');
    const year  = past.getFullYear();

    document.getElementById('clock').textContent =
        `${hours}:${mins} · ${day}/${month}/${year}`;
}


async function loadAlertCount() {
    try {
        const data = await fetch("/alerts").then(r => r.json());
        fadeUpdate(document.getElementById("alert-count"), data.count);
    } catch {
        fadeUpdate(document.getElementById("alert-count"), "Error");
    }
}

async function loadStatusCounts() {
    try {
        const data = await fetch("/summary/status-counts").then(r => r.json());
        const list = document.getElementById("status-counts");

        list.style.opacity = 0;

        let crit = "0", warn = "0";

        setTimeout(() => {
            list.innerHTML = "";
            data.forEach(item => {
                const li = document.createElement("li");
                li.textContent =
                    item.status.charAt(0).toUpperCase() +
                    item.status.slice(1) +
                    ": " + item.count;

                list.appendChild(li);

                if (item.status === "critical") crit = item.count;
                if (item.status === "warning") warn = item.count;
            });

            fadeUpdate(document.getElementById("critical-count"), crit);
            fadeUpdate(document.getElementById("warning-count"), warn);

            list.style.opacity = 1;
        }, 150);

    } catch {
        document.getElementById("status-counts").innerHTML =
            "<li>Error loading data</li>";
    }
}

// Running Functions
updateClock()
loadAlertCount();
loadStatusCounts();

//Setting Time intervals for each
setInterval(loadAlertCount,     15000);
setInterval(loadStatusCounts,   15000);
setInterval(updateClock,         1000);
</script>

</body>
</html>
