<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stroomloop · Alerts</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(180deg, #81C3DB 0%, #F2FCFF 100%); min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 24px 16px; }
        .app { width: 100%; max-width: 1200px; border-radius: 24px; overflow: hidden; box-shadow: 0 24px 64px rgba(34,83,130,0.2); background: linear-gradient(to bottom, #c8eaf3 0%, #d8f0f7 18%, #e4f6fa 36%, #edfafc 58%, #f3fdfe 78%, #F2FCFF 100%); }
        .navbar { display: flex; align-items: center; padding: 14px 24px; gap: 16px; }
        .logo { display: flex; align-items: center; gap: 8px; font-size: 1rem; font-weight: 700; color: #225382; white-space: nowrap; text-decoration: none; }
        .logo-dot { width: 10px; height: 10px; background: #225382; border-radius: 50%; display: inline-block; }
        .nav-pills { background: rgba(255,255,255,0.55); border-radius: 50px; padding: 5px; display: flex; gap: 2px; margin: 0 auto; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.8); }
        .nav-pill { padding: 7px 20px; border-radius: 50px; font-size: 0.875rem; font-weight: 500; color: #225382; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-block; }
        .nav-pill:hover { background: rgba(255,255,255,0.6); }
        .nav-pill.active { background: white; color: #225382; font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .login-btn { padding: 7px 18px; border-radius: 50px; font-size: 0.875rem; font-weight: 600; color: white; background: #225382; border: none; cursor: pointer; white-space: nowrap; text-decoration: none; display: inline-block; }
        .login-btn:hover { background: #1a3f63; }
        .page-content { padding: 20px 24px 32px; }
        .alerts-content { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; margin-top: 10px; max-width: 900px; }
        .alert-card { background: rgba(255,255,255,0.65); backdrop-filter: blur(8px); border-radius: 14px; padding: 20px; color: #1c3a55; min-height: 140px; border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 4px 18px rgba(34,83,130,0.07); }
        .alert-card h3 { margin-top: 0; margin-bottom: 10px; font-size: 1rem; font-weight: 600; color: #225382; }
        .alert-value { font-size: 1.8rem; font-weight: bold; margin: 0; color: #1c3a55; }
        .alert-value, .status-list { transition: opacity 0.3s ease; }
        .status-list { margin: 0; padding-left: 18px; color: #3a5a7a; }
        .status-list li { margin-bottom: 6px; }
    </style>
</head>
<body>
<div class="app">
    <nav class="navbar">
        <a class="logo" href="/dashboard.html"><span class="logo-dot"></span> Stroomloop</a>
        <div class="nav-pills">
            <a class="nav-pill" href="/dashboard.html">Dashboard</a>
            <a class="nav-pill active" href="/alerts.html">Alerts</a>
            <a class="nav-pill" href="/trends.html">Trends</a>
            <a class="nav-pill" href="/info.html">Information</a>
        </div>
        <a class="login-btn" href="/login.html">Log in</a>
    </nav>
    <div class="page-content">
        <div class="alerts-content">
            <div class="alert-card">
                <h3>Total Alert-Triggered Readings</h3>
                <p class="alert-value" id="alert-count">Loading...</p>
            </div>
            <div class="alert-card">
                <h3>Status Breakdown</h3>
                <ul class="status-list" id="status-counts"><li>Loading...</li></ul>
            </div>
            <div class="alert-card">
                <h3>Critical Readings</h3>
                <p class="alert-value" id="critical-count">Loading...</p>
            </div>
            <div class="alert-card">
                <h3>Warning Readings</h3>
                <p class="alert-value" id="warning-count">Loading...</p>
            </div>
        </div>
    </div>
</div>
<script>
    function fadeUpdate(el, val) {
        el.style.opacity = 0
        setTimeout(() => { el.textContent = val; el.style.opacity = 1 }, 150)
    }
    async function loadAlertCount() {
        try {
            const data = await fetch("/alerts").then(r => r.json())
            fadeUpdate(document.getElementById("alert-count"), data.count)
        } catch { fadeUpdate(document.getElementById("alert-count"), "Error") }
    }
    async function loadStatusCounts() {
        try {
            const data = await fetch("/summary/status-counts").then(r => r.json())
            const list = document.getElementById("status-counts")
            list.style.opacity = 0
            let crit = "0", warn = "0"
            setTimeout(() => {
                list.innerHTML = ""
                data.forEach(item => {
                    const li = document.createElement("li")
                    li.textContent = item.status.charAt(0).toUpperCase() + item.status.slice(1) + ": " + item.count
                    list.appendChild(li)
                    if (item.status === "critical") crit = item.count
                    if (item.status === "warning") warn = item.count
                })
                fadeUpdate(document.getElementById("critical-count"), crit)
                fadeUpdate(document.getElementById("warning-count"), warn)
                list.style.opacity = 1
            }, 150)
        } catch {
            document.getElementById("status-counts").innerHTML = "<li>Error loading data</li>"
        }
    }
    loadAlertCount()
    loadStatusCounts()
    setInterval(() => { loadAlertCount(); loadStatusCounts() }, 15000)
</script>
</body>
</html>
